services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=kenexai_user
      - POSTGRES_PASSWORD=kenexai_password
      - POSTGRES_DB=kenexai_talent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kenexai_user -d kenexai_talent_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
      - resume_uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  resume_uploads:
  postgres_data:
